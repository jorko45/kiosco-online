<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pritty & Doble Cola — Kiosco Online</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--dorado:#C9A84C;--dorado2:#e8c86a;--pritty:#e8000b;--pritty2:#aa0008}
body{font-family:'Montserrat',sans-serif;background:#0f0f0f;color:#fff;min-height:100vh}
nav{background:#0f0f0f;border-bottom:1.5px solid rgba(201,168,76,.3);padding:0 1.5rem;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-logo{font-size:18px;font-weight:900;color:var(--dorado);letter-spacing:2px;text-decoration:none;text-transform:uppercase}
.nav-logo span{color:rgba(255,255,255,.4);font-weight:400}
.nav-back{color:rgba(255,255,255,.6);font-size:13px;text-decoration:none;display:flex;align-items:center;gap:6px}
.nav-back:hover{color:var(--dorado)}
.cart-btn{background:var(--dorado);color:#111;border:none;padding:7px 16px;font-family:inherit;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:8px;border-radius:6px}
.cart-count{background:#111;color:var(--dorado);border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center}
.page-header{padding:1.5rem 1.5rem .5rem}
.page-header h1{font-size:24px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(--dorado)}
.page-header p{font-size:12px;color:rgba(255,255,255,.4);margin-top:3px}
.fridge-section{display:flex;justify-content:center;padding:1rem;overflow-x:auto}
.fridge-wrap{position:relative;flex-shrink:0}
.tip-box{position:absolute;background:#111;color:#fff;font-size:11px;padding:8px 12px;border-radius:10px;white-space:nowrap;pointer-events:none;z-index:99;display:none;text-align:center;line-height:1.6;min-width:120px;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.tip-box strong{display:block;font-size:13px;color:var(--dorado);margin-bottom:2px}
.tip-btn{display:block;width:100%;margin-top:6px;background:var(--dorado);color:#111;border:none;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;pointer-events:all}
.tip-btn:hover{background:var(--dorado2)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:#1a1a1a;border:1px solid rgba(201,168,76,.25);border-radius:18px;width:100%;max-width:360px;overflow:hidden;position:relative}
.modal-close{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.1);border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer;z-index:1}
.modal-img{width:100%;height:210px;background:#111;display:flex;align-items:center;justify-content:center;padding:16px;font-size:5rem}
.modal-img img{width:100%;height:100%;object-fit:contain}
.modal-body{padding:18px 20px 22px}
.modal-marca{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--dorado);margin-bottom:4px}
.modal-nombre{font-size:16px;font-weight:700;text-transform:uppercase;color:#fff;margin-bottom:4px;line-height:1.3}
.modal-desc{font-size:11px;color:rgba(255,255,255,.4);margin-bottom:14px}
.modal-precio{font-size:28px;font-weight:900;color:var(--dorado);margin-bottom:18px}
.modal-qty{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.modal-qty-label{font-size:11px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px}
.qty-ctrl{display:flex;align-items:center;border:1px solid rgba(255,255,255,.15);border-radius:8px;overflow:hidden}
.qty-ctrl button{background:rgba(255,255,255,.07);border:none;color:#fff;width:36px;height:36px;font-size:20px;cursor:pointer}
.qty-ctrl button:hover{background:rgba(201,168,76,.2)}
.qty-ctrl span{min-width:36px;text-align:center;font-size:15px;font-weight:700;color:#fff}
.modal-add{width:100%;padding:14px;background:var(--dorado);color:#111;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
.modal-add:hover{background:var(--dorado2)}
.modal-add.ok{background:#2e7d32;color:#fff}
.cart-float{position:fixed;bottom:0;left:0;right:0;background:#1a1a1a;border-top:1.5px solid rgba(201,168,76,.3);padding:12px 1.5rem;display:none;align-items:center;justify-content:space-between;z-index:200}
.cart-float.on{display:flex}
.cart-float-info{font-size:12px;color:rgba(255,255,255,.5)}
.cart-float-total{font-size:18px;font-weight:900;color:var(--dorado)}
.cart-float-btn{background:var(--dorado);color:#111;border:none;padding:12px 24px;font-family:inherit;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:8px}
</style>
</head>
<body>

<nav>
  <a class="nav-back" href="index.html">← Volver</a>
  <a class="nav-logo" href="index.html">Kiosco<span> Online</span></a>
  <button class="cart-btn" onclick="verCarrito()">
    🛒 Carrito <span class="cart-count" id="cart-count">0</span>
  </button>
</nav>

<div class="page-header">
  <h1>🥤 Pritty Limón & Doble Cola</h1>
  <p>Pritty Limón + Doble Cola en todos sus sabores — 500ml, 2.25L y 3L</p>
</div>

<div class="fridge-section">
  <div class="fridge-wrap">
    <svg id="hel" width="500" viewBox="0 0 500 760" xmlns="http://www.w3.org/2000/svg">
      <defs><clipPath id="gc"><rect x="70" y="50" width="380" height="640" rx="3"/></clipPath></defs>
    </svg>
    <div class="tip-box" id="tip">
      <strong id="tip-p"></strong>
      <span id="tip-n"></span>
      <button class="tip-btn" id="tip-btn">Ver producto</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)cerrarModal()">
  <div class="modal">
    <button class="modal-close" onclick="cerrarModal()">✕</button>
    <div class="modal-img" id="modal-img-wrap">🥤</div>
    <div class="modal-body">
      <div class="modal-marca" id="modal-marca"></div>
      <div class="modal-nombre" id="modal-nombre"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-precio" id="modal-precio"></div>
      <div class="modal-qty">
        <span class="modal-qty-label">Cantidad</span>
        <div class="qty-ctrl">
          <button onclick="chQty(-1)">−</button>
          <span id="modal-qty">1</span>
          <button onclick="chQty(1)">+</button>
        </div>
      </div>
      <button class="modal-add" id="modal-add" onclick="addFromModal()">Agregar al carrito</button>
    </div>
  </div>
</div>

<div class="cart-float" id="cart-float">
  <div>
    <div class="cart-float-info" id="cart-float-info"></div>
    <div class="cart-float-total" id="cart-float-total"></div>
  </div>
  <button class="cart-float-btn" onclick="verCarrito()">Ver pedido →</button>
</div>

<script>
const WA = '5493515479266';

// Colores por sabor
const SABORES = {
  'Cola':      {color:'#c8001e', lc:'#fff', lbl:'COLA'},
  'Naranja':   {color:'#ff6b00', lc:'#fff', lbl:'NRNJ'},
  'Limón':     {color:'#ddcc00', lc:'#333', lbl:'LMN'},
  'Lima Limón':{color:'#88bb00', lc:'#fff', lbl:'LIMA'},
  'Pomelo':    {color:'#e8c020', lc:'#333', lbl:'PMLO'},
};

// Color secundario por marca
const MARCAS_COLOR = {
  'Pritty':    '#cc0000',
  'Doble Cola':'#880088',
};

const PRODS = [
  // ── 500ml ──
  {id:101, marca:'Pritty',     sabor:'Limón',      n:'Pritty Limón 500ml',       d:'Botella 500ml', p:900,  img:'', tipo:'botella',   h:68, w:17},
  {id:102, marca:'Doble Cola', sabor:'Cola',        n:'Doble Cola 500ml',         d:'Botella 500ml', p:900,  img:'', tipo:'botella',   h:68, w:17},
  {id:103, marca:'Doble Cola', sabor:'Naranja',     n:'Doble Cola Naranja 500ml', d:'Botella 500ml', p:900,  img:'', tipo:'botella',   h:68, w:17},
  {id:104, marca:'Doble Cola', sabor:'Lima Limón',  n:'Doble Cola Lima Limón 500ml',d:'Botella 500ml',p:900, img:'', tipo:'botella',   h:68, w:17},
  {id:105, marca:'Doble Cola', sabor:'Pomelo',      n:'Doble Cola Pomelo 500ml',  d:'Botella 500ml', p:900,  img:'', tipo:'botella',   h:68, w:17},
  // ── 2.25L ──
  {id:201, marca:'Pritty',     sabor:'Limón',      n:'Pritty Limón 2.25L',       d:'Botella 2.25L', p:2800, img:'', tipo:'botella_g', h:96, w:20},
  {id:202, marca:'Doble Cola', sabor:'Cola',        n:'Doble Cola 2.25L',         d:'Botella 2.25L', p:2800, img:'', tipo:'botella_g', h:96, w:20},
  {id:203, marca:'Doble Cola', sabor:'Naranja',     n:'Doble Cola Naranja 2.25L', d:'Botella 2.25L', p:2800, img:'', tipo:'botella_g', h:96, w:20},
  {id:204, marca:'Doble Cola', sabor:'Lima Limón',  n:'Doble Cola Lima Limón 2.25L',d:'Botella 2.25L',p:2800,img:'',tipo:'botella_g', h:96, w:20},
  {id:205, marca:'Doble Cola', sabor:'Pomelo',      n:'Doble Cola Pomelo 2.25L',  d:'Botella 2.25L', p:2800, img:'', tipo:'botella_g', h:96, w:20},
  // ── 3L ──
  {id:301, marca:'Pritty',     sabor:'Limón',      n:'Pritty Limón 3L',          d:'Botella 3L',    p:3500, img:'', tipo:'botella_g', h:108, w:22},
  {id:302, marca:'Doble Cola', sabor:'Cola',        n:'Doble Cola 3L',            d:'Botella 3L',    p:3500, img:'', tipo:'botella_g', h:108, w:22},
  {id:303, marca:'Doble Cola', sabor:'Naranja',     n:'Doble Cola Naranja 3L',    d:'Botella 3L',    p:3500, img:'', tipo:'botella_g', h:108, w:22},
  {id:304, marca:'Doble Cola', sabor:'Lima Limón',  n:'Doble Cola Lima Limón 3L', d:'Botella 3L',    p:3500, img:'', tipo:'botella_g', h:108, w:22},
  {id:305, marca:'Doble Cola', sabor:'Pomelo',      n:'Doble Cola Pomelo 3L',     d:'Botella 3L',    p:3500, img:'', tipo:'botella_g', h:108, w:22},
];

const ESTANTES = [
  {label:'Botellas 500ml',   ids:[101,101,101,102,102,103,103,104,104,105,105]},
  {label:'Botellas 2.25L',   ids:[201,201,201,202,202,203,203,204,204,205,205]},
  {label:'Botellas 3L',      ids:[301,301,301,302,302,303,303,304,304,305,305]},
];

const FX=70, FW=380, gY=50, gH=640;
const GAP=3, nS=ESTANTES.length;
const sStep=Math.floor(gH/nS);

let cart={}, modalProd=null, modalQty=1;
window._fItems=[];

function fmt(n){return '$'+n.toLocaleString('es-AR')}

function getColor(prod){
  return SABORES[prod.sabor] || {color:'#888', lc:'#fff', lbl:'???'};
}

function drawFridge(){
  const svg=document.getElementById('hel');
  let s='';

  // Sombra piso
  s+=`<ellipse cx="280" cy="752" rx="210" ry="7" fill="#000" opacity="0.2"/>`;

  // Costado 3D — color Pritty rojo
  s+=`<polygon points="${FX-50},${gY+26} ${FX},${gY-2} ${FX},${gY+gH+56} ${FX-50},${gY+gH+28}" fill="#aa0008"/>`;
  s+=`<polygon points="${FX-50},${gY+26} ${FX},${gY-2} ${FX},${gY-14} ${FX-50},${gY+12}" fill="#cc0010" opacity="0.6"/>`;
  s+=`<line x1="${FX-50}" y1="${gY+26}" x2="${FX-50}" y2="${gY+gH+28}" stroke="rgba(0,0,0,.3)" stroke-width="1.5"/>`;
  // Logo lateral
  s+=`<text transform="translate(${FX-50+26},${gY+gH/2+30}) rotate(-90)" text-anchor="middle" fill="#fff" font-size="14" font-weight="900" opacity="0.92" letter-spacing="2">PRITTY</text>`;
  s+=`<text transform="translate(${FX-50+26},${gY+gH/2-20}) rotate(-90)" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="9" font-weight="600" opacity="0.8" letter-spacing="1">& DOBLE COLA</text>`;
  // Ondas decorativas
  s+=`<path d="M${FX-40} ${gY+100} Q${FX-24} ${gY+90} ${FX-8} ${gY+100}" stroke="#fff" stroke-width="2" fill="none" opacity="0.3"/>`;
  s+=`<path d="M${FX-40} ${gY+110} Q${FX-24} ${gY+100} ${FX-8} ${gY+110}" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.15"/>`;
  s+=`<path d="M${FX-40} ${gY+450} Q${FX-24} ${gY+440} ${FX-8} ${gY+450}" stroke="#fff" stroke-width="2" fill="none" opacity="0.3"/>`;
  s+=`<path d="M${FX-40} ${gY+460} Q${FX-24} ${gY+450} ${FX-8} ${gY+460}" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.15"/>`;
  [FX-38, FX-12].forEach(rx=>{ s+=`<ellipse cx="${rx}" cy="${gY+gH+36}" rx="7" ry="5" fill="#1a1a1a" stroke="#333" stroke-width="0.5"/>`; });

  // Cuerpo
  s+=`<rect x="${FX}" y="6" width="${FW}" height="${gH+68}" rx="10" fill="#1a1a1a"/>`;
  s+=`<rect x="${FX+4}" y="10" width="${FW-8}" height="${gH+60}" rx="8" fill="#232323"/>`;
  // LED
  s+=`<rect x="${FX+4}" y="10" width="${FW-8}" height="36" rx="7" fill="#181818"/>`;
  s+=`<rect x="${FX+70}" y="20" width="${FW-140}" height="8" rx="4" fill="#88ddff" opacity="0.85"/>`;
  s+=`<rect x="${FX+70}" y="20" width="${FW-140}" height="3" rx="2" fill="#cceeff" opacity="0.5"/>`;
  // Vidrio
  s+=`<rect x="${FX}" y="${gY}" width="${FW}" height="${gH}" rx="3" fill="#0e1e2c"/>`;
  s+=`<rect x="${FX}" y="${gY}" width="14" height="${gH}" fill="#fff" opacity="0.025"/>`;

  // Productos
  s+=`<g clip-path="url(#gc)">`;
  ESTANTES.forEach((est,si)=>{
    const shelfY=gY+(si+1)*sStep-7;
    const items=est.ids.map(id=>PRODS.find(p=>p.id===id));
    window._fItems[si]=items;

    const totalW=items.reduce((a,p)=>a+p.w+GAP,0)-GAP;
    let bx=FX+Math.floor((FW-totalW)/2);

    items.forEach((item,ii)=>{
      const sab=getColor(item);
      const by=shelfY-item.h, cx=bx+Math.floor(item.w/2);
      // Banda superior de la marca (Pritty=rojo, Doble Cola=morado)
      const marcaBand = item.marca==='Pritty' ? '#cc0000' : '#880088';

      s+=`<g class="pg" data-si="${si}" data-ii="${ii}" style="cursor:pointer">`;
      if(item.tipo==='botella'){
        const nH=12,bH=item.h-nH,nW=item.w-4,nX=bx+2;
        s+=`<rect x="${nX}" y="${by}" width="${nW}" height="${nH}" rx="2" fill="${marcaBand}" opacity="0.9"/>`;
        s+=`<rect x="${bx}" y="${by+nH}" width="${item.w}" height="${bH}" rx="2" fill="${sab.color}"/>`;
        s+=`<rect x="${bx+2}" y="${by+nH+2}" width="2.5" height="${bH-6}" rx="1" fill="#fff" opacity="0.16"/>`;
        s+=`<text x="${cx}" y="${by+nH+bH/2+4}" text-anchor="middle" fill="${sab.lc}" font-size="6.5" font-weight="500">${sab.lbl}</text>`;
      } else {
        const nH=18,bH=item.h-nH,nW=item.w-5,nX=bx+2;
        s+=`<rect x="${nX}" y="${by}" width="${nW}" height="${nH}" rx="2" fill="${marcaBand}" opacity="0.9"/>`;
        s+=`<rect x="${bx}" y="${by+nH}" width="${item.w}" height="${bH}" rx="2" fill="${sab.color}"/>`;
        s+=`<rect x="${bx+2}" y="${by+nH+2}" width="3" height="${bH-6}" rx="1" fill="#fff" opacity="0.14"/>`;
        s+=`<text x="${cx}" y="${by+nH+bH/2+4}" text-anchor="middle" fill="${sab.lc}" font-size="6.5" font-weight="500">${sab.lbl}</text>`;
      }
      s+=`</g>`;
      bx+=item.w+GAP;
    });

    // Separador entre Pritty y Doble Cola
    const midX = FX + Math.floor(FW/2);
    s+=`<line x1="${midX}" y1="${shelfY - ESTANTES[si].ids.length > 0 ? Math.max(...items.map(i=>i.h)) + 2 : 0}" x2="${midX}" y2="${shelfY}" stroke="rgba(255,255,255,.08)" stroke-width="1" stroke-dasharray="3,3"/>`;

    // Estante metálico
    s+=`<rect x="${FX}" y="${shelfY}" width="${FW}" height="5" rx="2" fill="#4a6878"/>`;
    s+=`<rect x="${FX}" y="${shelfY}" width="${FW}" height="1.5" fill="#7aaabb"/>`;
    s+=`<text x="${FX+6}" y="${shelfY-5}" fill="rgba(255,255,255,.35)" font-size="7.5">← Pritty</text>`;
    s+=`<text x="${FX+80}" y="${shelfY-5}" fill="rgba(255,255,255,.35)" font-size="7.5">Doble Cola →</text>`;
    s+=`<text x="${FX+FW-6}" y="${shelfY-5}" text-anchor="end" fill="#6a9aaa" font-size="8" opacity="0.7">${est.label}</text>`;
  });
  s+=`</g>`;

  // Leyenda de sabores
  const sabKeys = Object.keys(SABORES);
  const legendY = gY + gH + 12;
  s+=`<text x="${FX}" y="${legendY}" fill="rgba(255,255,255,.3)" font-size="7.5">Sabores:</text>`;
  sabKeys.forEach((k,i)=>{
    const sx = FX + 50 + i*78;
    s+=`<rect x="${sx}" y="${legendY-8}" width="10" height="10" rx="2" fill="${SABORES[k].color}"/>`;
    s+=`<text x="${sx+14}" y="${legendY}" fill="rgba(255,255,255,.5)" font-size="7.5">${k}</text>`;
  });

  // Base y ruedas
  s+=`<rect x="${FX}" y="${gY+gH}" width="${FW}" height="66" fill="#181818"/>`;
  s+=`<rect x="${FX+FW/2-28}" y="${gY+gH+16}" width="56" height="8" rx="4" fill="#333"/>`;
  s+=`<circle cx="${FX+FW-18}" cy="${gY+gH+18}" r="5" fill="#0f0" opacity="0.75"/>`;
  [FX+24, FX+FW-24].forEach(rx=>{
    s+=`<ellipse cx="${rx}" cy="${gY+gH+54}" rx="10" ry="7" fill="#1a1a1a" stroke="#333" stroke-width="0.5"/>`;
    s+=`<ellipse cx="${rx}" cy="${gY+gH+54}" rx="4" ry="3" fill="#333"/>`;
  });

  const defs=svg.querySelector('defs').outerHTML;
  svg.innerHTML=defs+s;

  svg.querySelectorAll('.pg').forEach(g=>{
    g.addEventListener('mouseenter',e=>{
      const item=window._fItems[+g.dataset.si][+g.dataset.ii];
      document.getElementById('tip-p').textContent=fmt(item.p);
      document.getElementById('tip-n').textContent=item.n;
      document.getElementById('tip-btn').onclick=()=>{ abrirModal(item); document.getElementById('tip').style.display='none'; };
      const tip=document.getElementById('tip');
      tip.style.display='block';
      const wr=g.closest('div').getBoundingClientRect();
      const gr=g.getBoundingClientRect();
      tip.style.left=(gr.left-wr.left+gr.width/2-60)+'px';
      tip.style.top=(gr.top-wr.top-tip.offsetHeight-10)+'px';
    });
    g.addEventListener('mouseleave',()=>setTimeout(()=>{ if(!document.getElementById('tip').matches(':hover')) document.getElementById('tip').style.display='none'; },200));
    g.addEventListener('click',()=>abrirModal(window._fItems[+g.dataset.si][+g.dataset.ii]));
  });
  document.getElementById('tip').addEventListener('mouseleave',()=>document.getElementById('tip').style.display='none');
}

function abrirModal(prod){
  modalProd=prod; modalQty=1;
  const sab=getColor(prod);
  const wrap=document.getElementById('modal-img-wrap');
  wrap.innerHTML = prod.img ? `<img src="${prod.img}" alt="${prod.n}" onerror="this.parentNode.innerHTML='🥤'"/>` : '🥤';
  document.getElementById('modal-marca').textContent=`${prod.marca} — ${prod.sabor}`;
  document.getElementById('modal-nombre').textContent=prod.n;
  document.getElementById('modal-desc').textContent=prod.d;
  document.getElementById('modal-precio').textContent=fmt(prod.p);
  document.getElementById('modal-qty').textContent=1;
  const btn=document.getElementById('modal-add');
  btn.textContent='Agregar al carrito'; btn.classList.remove('ok');
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function cerrarModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow='';
}

function chQty(d){ modalQty=Math.max(1,modalQty+d); document.getElementById('modal-qty').textContent=modalQty; }

function addFromModal(){
  if(!modalProd) return;
  cart[modalProd.id]=(cart[modalProd.id]||0)+modalQty;
  updateCartUI();
  const btn=document.getElementById('modal-add');
  btn.textContent='✓ Agregado'; btn.classList.add('ok');
  setTimeout(cerrarModal,900);
}

function updateCartUI(){
  const qty=Object.values(cart).reduce((a,b)=>a+b,0);
  document.getElementById('cart-count').textContent=qty;
  const total=Object.keys(cart).reduce((s,k)=>{ const p=PRODS.find(x=>x.id===Number(k)); return p?s+p.p*cart[k]:s; },0);
  const fl=document.getElementById('cart-float');
  if(qty){ fl.classList.add('on'); document.getElementById('cart-float-info').textContent=qty+(qty===1?' producto':' productos'); document.getElementById('cart-float-total').textContent=fmt(total); }
  else fl.classList.remove('on');
}

function verCarrito(){
  const items=Object.keys(cart).map(k=>{ const p=PRODS.find(x=>x.id===Number(k)); return p?`• ${p.n} x${cart[k]} — ${fmt(p.p*cart[k])}`:null; }).filter(Boolean);
  if(!items.length){ alert('Tu carrito está vacío'); return; }
  const total=Object.keys(cart).reduce((s,k)=>{ const p=PRODS.find(x=>x.id===Number(k)); return p?s+p.p*cart[k]:s; },0);
  const msg=encodeURIComponent(`🛒 *PEDIDO — Kiosco Online*\n\n${items.join('\n')}\n\n💰 *TOTAL: ${fmt(total)}*\n\n_Quiero coordinar el envío_`);
  window.open(`https://wa.me/${WA}?text=${msg}`,'_blank');
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape') cerrarModal(); });
drawFridge();
</script>
